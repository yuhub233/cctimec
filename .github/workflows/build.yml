name: Build CCTimeC

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: cd server && npm install
      - name: Package server
        run: |
          cd server
          mkdir -p ../dist
          tar -czf ../dist/cctimec-server.tar.gz --exclude=node_modules --exclude=data.db .
      - uses: actions/upload-artifact@v4
        with:
          name: cctimec-server
          path: dist/cctimec-server.tar.gz

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew 2>/dev/null || true
          gradle wrapper 2>/dev/null || true
          gradle assembleRelease || gradle assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: cctimec-android
          path: android/app/build/outputs/apk/

  release:
    needs: [build-server, build-android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            cctimec-server/cctimec-server.tar.gz
            cctimec-android/**/*.apk
